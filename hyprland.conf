env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NVD_BACKEND,direct
env = AQ_FORCE_LINEAR_BLIT,0

env = HYPRCURSOR_THEME,AC-Future
env = HYPRCURSOR_SIZE,40
env = XCURSOR_THEME,AC-Future
env = XCURSOR_SIZE,40

$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$leftMonitor = DP-3
$rightMonitor = DP-1

### DECORATIONS
decoration {
  rounding = 12
  # xray = true
  shadow {
    enabled = true
    range = 5
  }
  # https://wiki.hypr.land/Configuring/Variables/#blur
  blur {
    enabled = true
    new_optimizations = true
    size = 4
    passes = 3
  }
}

### GENERAL - https://wiki.hypr.land/Configuring/Variables/#general
general {
  gaps_in = 3 # gaps between windows
  gaps_out = 4 # gaps between windows and monitor edges
  float_gaps = 0 # gaps for floating windows
  border_size = 0
  col.active_border = rgba(39,40,54,0.5)
}
### vicinae
layerrule {
  name = vicinae-blur
  blur = on
  ignore_alpha = 0
  match:namespace = vicinae
}

### LAYOUT CONFIGS
dwindle {
  preserve_split = true
}

### WORKSPACE BINDINGS
workspace = 1, monitor:$leftMonitor
workspace = 2, monitor:$rightMonitor
workspace = 8, monitor:$rightMonitor

### MONITORS
monitor = $leftMonitor, 1920x1080@144, 0x0, 1
monitor = $rightMonitor, 1920x1080@165, 1920x0, 1

### AUTOSTART
exec-once = waybar -c ~/.config/waybar/config_dock -s ~/.config/waybar/dock.css
exec-once = vicinae server
exec-once = awww-daemon
# exec-once = hyprpaper (disable if using awww-daemon)
exec-once = systemctl --user start hyprpolkitagent
exec-once = mako # notification daemon
exec-once = xrandr --output DP-3 --primary

# https://wiki.hypr.land/Useful-Utilities/Clipboard-Managers/#cliphist
exec-once = wl-clip-persist --clipboard regular
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data

### INPUT
input {
  kb_layout = us
  follow_mouse = 1
}

binds {
  allow_workspace_cycles = true
}

### GENERAL BINDS
bind = $mainMod CTRL SHIFT, P, exec, poweroff
bind = $mainMod CTRL SHIFT, M, exit,
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, Q, exec, $terminal
bind = $mainMod SHIFT, Q, exec, $terminal --class floating-kitty
bind = $mainMod CTRL SHIFT, R, exec, vicinae server --replace
bind = $mainMod, R, exec, vicinae toggle
bind = $mainMod, M, exec, pavucontrol
bind = $mainMod CTRL SHIFT, V, exec, pactl set-sink-mute 0 toggle
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, C, forcekillactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pin
bind = $mainMod, B, exec, /usr/lib/firefox/firefox
bind = $mainMod, Y, exec, firefox --new-tab https://www.youtube.com/
bind = $mainMod, T, exec, firefox --new-tab https://www.twitch.tv/
bind = $mainMod SHIFT, T, exec, bash -c 'source ~/.config/hypr/env.sh; firefox --new-window "https://dashboard.twitch.tv/popout/u/${TWITCH_NAME}/stream-manager/activity-feed?uuid=${TWITCH_UUID}"'
bind = $mainMod, G, exec, firefox --new-tab https://www.github.com/
bind = $mainMod SHIFT, W, exec, pkill -x waybar
bind = $mainMod, W, exec, waybar -c ~/.config/waybar/config_dock -s ~/.config/waybar/dock.css
bind = $mainMod, F, exec, hyprctl dispatch fullscreen 1
bind = $mainMod SHIFT, F, exec, hyprctl dispatch fullscreen 0
bind = $mainMod SHIFT, R, exec, selector.sh
bind = $mainMod SHIFT, B, exec, ~/.config/waybar/scripts/waybar-selector.sh
bind = $mainMod SHIFT, S, exec, bash -c 'dir=~/Screenshots; mkdir -p "$dir"; area=$(slurp); [ -n "$area" ] && grim -g "$area" - | tee "$dir/$(date +%Y-%m-%d_%H-%M-%S).png" | wl-copy && notify-send -t 1400 "Screenshot copied to clipboard"'
bind = $mainMod SHIFT, P, exec, ~/.config/hypr/scripts/hyprpicker.sh
bind = $mainMod SHIFT, K, exec, wayvibes ~/workspace/github/public/wayvibes/soundpacks/nk-cream/ -v 0.8
bind = $mainMod CTRL SHIFT, K, exec, pkill -x wayvibes
bind = $mainMod, A, exec, ~/.config/hypr/scripts/pogo-sink-switch.sh
bind = $mainMod CTRL, O, setprop, active rounding 0 # remove rounding for active window
bind = $mainMod CTRL SHIFT, O, setprop, active rounding unset # revert rounding for active window back to default

# Move window focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows around
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod CTRL, F, layoutmsg, swapsplit
# Force vertical split and move window to top/bottom
bind = $mainMod CTRL, down, exec, hyprctl dispatch layoutmsg togglesplit ; hyprctl dispatch swapwindow d
bind = $mainMod CTRL, up, exec, hyprctl dispatch layoutmsg togglesplit ; hyprctl dispatch swapwindow u
binde = $mainMod CTRL, left, exec, hyprctl dispatch resizeactive -200 0 # (x, y)
binde = $mainMod CTRL, right, exec, hyprctl dispatch resizeactive 200 0 # (x, y)

# Switch Workspaces [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

### Scrolling workspace binds
binde = $mainMod, period, layoutmsg, move +col
binde = $mainMod, comma, layoutmsg, move -col
# Swaps the current column with its neighbor
bind = $mainMod SHIFT, comma, layoutmsg, swapcol l
bind = $mainMod SHIFT, period, layoutmsg, swapcol r

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod, TAB, workspace, m+1
bind = $mainMod SHIFT, TAB, workspace, m-1

# move/resize windows left/right click
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

### QUICK ACCESS BINDS
bind = $mainMod, H, exec, $terminal nvim ~/.config/hypr/hyprland.conf
bind = $mainMod, N, exec, $terminal nvim ~/.config/nvim/init.lua
bind = $mainMod SHIFT, H, exec, $terminal --directory ~/.config/hypr/
bind = $mainMod SHIFT, N, exec, $terminal --directory ~/.config/nvim/

### MEDIA BINDS
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next

### WINDOW RULES
windowrule = match:initial_class it.mijorus.gearlever, float on, size 840 540
windowrule = opacity 0.8 0.6, match:class kitty
windowrule = opacity 0.8 0.6, match:class floating-kitty
windowrule = match:class floating-kitty, float on, size 750 450, move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5))
windowrule = match:initial_class org.openrgb.OpenRGB, float on, center on, size 1230 880
windowrule = match:initial_class [Tt]hunar, float on, size 930 740, center on
windowrule = match:initial_class org.pulseaudio.pavucontrol, size 930 740
windowrule = match:initial_class recorder-picker, float on, size 500 250, center on, stay_focused on
windowrule = match:initial_class waybar-selector, float on, center on, size 460 140
windowrule = match:initial_class [Ss]potify, monitor $rightMonitor, workspace 9 silent
windowrule {
  name = pogo-split-overlay
  match:initial_class = pogostuck-split-tracker
  match:initial_title = split-overlay
  
  no_blur = on
  border_size = 0
  no_shadow = on

  float = on
  pin = on
  move = 1500 6
  size = 416 223
}
windowrule = workspace 8 silent, match:initial_title Streamer.bot.*
windowrule = match:initial_class gcr-prompter, stay_focused on
windowrule = match:initial_title Junker's Split Tracker.*, size 970 780, center on, float on
windowrule = match:initial_class Bitwarden, size 1350 840, float on, center on
windowrule = match:initial_class LosslessCut, size 1500 900, float on, center on
windowrule = match:initial_class mpv, size 1500 900, float on, center on
windowrule = match:initial_class hyprland-share-picker, size 500 550, float on, center on
windowrule = match:initial_class xdg-desktop-portal-gtk, match:initial_title Open file, size 1450 900, float on, center on
windowrule = match:initial_class xdg-desktop-portal-gtk, match:initial_title Save Image, size 980 730, float on, center on
windowrule = match:initial_class xdg-desktop-portal-gtk, match:initial_title Local File, size 1450 900, float on, center on
windowrule = match:initial_class wootility, size 1650 980, float on, center on
windowrule = match:initial_class firefox, match:initial_title Picture-in-Picture, float on, size 680 382
windowrule = match:initial_class firefox, match:initial_title Library, float on, center on, size 910 910
# Minecraft stuff
windowrule = match:initial_class org.multimc.MultiMC, float on, center on, size 845 645
windowrule = match:initial_class org.prismlauncher.PrismLauncher, float on, center on, size 845 645
windowrule = monitor $leftMonitor, match:initial_class Minecraft.*
windowrule = match:initial_class discord, float on, size 1700 1000, center on
# steam windowrules ----
windowrule = monitor $leftMonitor, match:initial_class steam_app_.*
windowrule = monitor $rightMonitor, match:initial_title VTube Studio, workspace 5 silent, fullscreen on
windowrule = match:initial_class org.telegram.desktop, float on, size 635 802
windowrule = match:initial_class org.telegram.desktop, match:initial_title Media viewer, float on, size 850 850
windowrule = match:initial_title Steam, match:initial_class steam, tile on
windowrule = match:initial_title Steam Settings, match:initial_class steam, float on, center on
windowrule = match:initial_title Sign in to Steam, center on
windowrule = match:initial_title Image Popout, match:initial_class steam, float on, center on
windowrule = match:initial_title Friends List, match:initial_class steam, float on, center on
windowrule = match:initial_title Shutdown, match:initial_class steam, center on
windowrule = match:initial_title Special Offers, match:initial_class steam, center on
windowrule = match:initial_class xdg-desktop-portal-gtk, match:initial_title Pick game to add, size 800 600, float on, center on
windowrule = match:initial_class steam, match:initial_title Add Non-Steam Game, size 700 650, float on, center on
# ----
windowrule = match:class streamer.bot.exe match:title Add Action, fullscreen off
windowrule = match:class com.chatterino.chatterino, float on, size 365 610, move 39 362
windowrule = match:initial_title Video Trimmer, float on, center on, size 1294 910

### ANIMATIONS - https://wiki.hypr.land/Configuring/Animations/
animation = windows, 1, 2, default, gnomed
animation = workspaces, 1, 1.5, default

